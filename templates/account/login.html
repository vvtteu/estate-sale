<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход — Adjara Estate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0e1c2e;
      --navy-2: #142943;
      --gold: #c9a24a;
      --cream: #f7f2e6;
      --white: #ffffff;
      --text: #142132;
      --border: rgba(14,28,46,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Manrope', sans-serif;
      background: var(--cream);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .auth-card {
      background: var(--white);
      width: 100%;
      max-width: 420px;
      border-radius: 18px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(14,28,46,0.06);
      text-align: center;
      border: 1px solid var(--border);
    }
    .auth-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      letter-spacing: 0.1em;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .auth-brand span { color: var(--gold); }
    .auth-title {
      font-size: 16px;
      color: #6b7280;
      margin-bottom: 32px;
    }
    
    /* Стилизуем стандартные формы Django */
    .auth-form p { margin-bottom: 20px; text-align: left; }
    .auth-form label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .auth-form input[type="text"],
    .auth-form input[type="email"],
    .auth-form input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Manrope', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .auth-form input:focus { border-color: var(--navy); }
    
    .btn-submit {
      width: 100%;
      background: var(--navy);
      color: var(--white);
      border: none;
      padding: 16px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: var(--navy-2); }
    
    .auth-links { margin-top: 24px; font-size: 14px; color: #6b7280; }
    .auth-links a { color: var(--navy); font-weight: 600; text-decoration: none; }
    .auth-links a:hover { text-decoration: underline; }
    
    /* Скрываем список ошибок, если он пустой */
    .errorlist { color: #d1495b; font-size: 13px; text-align: left; list-style: none; margin-bottom: 10px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-brand">ADJARA <span>ESTATE</span></div>
    <div class="auth-title">С возвращением</div>

    <!-- action с логином и csrf_token обязательны! -->
    <form class="auth-form" method="POST" action="{% url 'account_login' %}">
      {% csrf_token %}
      {{ form.as_p }}
      
      {% if redirect_field_value %}
      <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
      {% endif %}
      
      <button type="submit" class="btn-submit">Войти</button>
    </form>

    <div class="auth-links">
      Ещё нет аккаунта? <a href="{% url 'account_signup' %}">Зарегистрироваться</a>
    </div>
  </div>
</body>
</html>
